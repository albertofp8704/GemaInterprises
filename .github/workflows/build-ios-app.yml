name: Build GemaTeacher iOS App (simulator, unsigned)

on:
  push:
    branches:
      - master
      - claude/foreground-window-agent-1r6vpo
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Capacitor deps
        working-directory: mobile
        run: npm install

      - name: Sync web assets into iOS project
        working-directory: mobile
        run: npx cap sync ios

      - name: Build for iOS Simulator (unsigned)
        working-directory: mobile/ios/App
        run: |
          xcodebuild -project App.xcodeproj -target App \
            -sdk iphonesimulator -configuration Debug \
            CODE_SIGNING_ALLOWED=NO build
