name: Build GemaTeacher Android App

on:
  push:
    branches:
      - master
      - claude/foreground-window-agent-1r6vpo
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor deps
        working-directory: mobile
        run: npm install

      - name: Sync web assets into Android project
        working-directory: mobile
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GemaTeacher-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
